<!DOCTYPE html>

    <style>
        .history-page {
            min-height: 100vh;
            background: var(--background);
        }
        .history-header {
            background: var(--surface);
            padding: 80px 0 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .history-header h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .history-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-light);
            text-decoration: none;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .back-link:hover {
            color: var(--primary);
        }
        .version-section {
            padding: 60px 0;
        }
        .version-block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 32px;
            overflow: hidden;
        }
        .version-header {
            background: var(--gradient-1);
            color: white;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .version-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .version-meta {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .version-date {
            opacity: 0.9;
        }
        .version-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .version-content {
            padding: 32px;
        }
        .changelog {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        .changelog h4 {
            color: var(--text);
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .changelog p {
            color: var(--text-muted);
        }
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        .download-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--background);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .download-item-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }
        .download-item-icon svg {
            width: 24px;
            height: 24px;
        }
        .download-item-info {
            flex: 1;
        }
        .download-item-name {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .download-item-arch {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .download-item-btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .download-item-btn:hover {
            background: var(--primary-light);
        }
    </style>
</head>
<body class="history-page">

            <ul class="nav-links">

                        <span class="lang-current">中</span>

                </li>

        </div>

    <!-- 页面头部 -->
    <header class="history-header">
        <div class="container">
            <a href="../index.html" class="back-link" data-i18n="history.backToHome">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    </header>

    <!-- 版本列表 -->
    <section class="version-section">
        <div class="container" id="versions-container">
            <!-- 版本列表由 JavaScript 生成 -->
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>

                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>

                <p class="footer-desc" data-i18n="footer.desc">一个对新手友好的轻量级笔记工具</p>
                <div class="footer-links">
                    <a href="../index.html#features" data-i18n="nav.features">功能</a>
                    <a href="../index.html#quickstart" data-i18n="nav.quickstart">快速开始</a>
                    <a href="../index.html#config" data-i18n="nav.config">配置</a>
                    <a href="https://github.com/tongjinlv/notes" target="_blank">GitHub</a>
                </div>
                <p class="footer-license" data-i18n="footer.license">开源项目，遵循 MIT 许可证</p>
            </div>
        </div>
    </footer>

    <script>
        // 平台图标
        const platformIcons = {
            windows: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>',
            linux: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>',
            macos: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>'
        };

        const platformNames = { windows: 'Windows', linux: 'Linux', macos: 'macOS' };

        // 生成版本列表
        function generateVersionList() {
            const container = document.getElementById('versions-container');
            
            // 合并最新版本和历史版本
            const allVersions = [
                {
                    version: VERSION.latest,
                    date: VERSION.date,
                    changelog: VERSION.changelog,
                    files: VERSION.files,
                    isLatest: true
                },
                ...VERSIONS_HISTORY.filter(v => v.version !== VERSION.latest).map(v => ({
                    ...v,
                    isLatest: false
                }))
            ];

            allVersions.forEach((ver, index) => {
                const block = document.createElement('div');
                block.className = 'version-block';
                
                // 版本头部
                const header = document.createElement('div');
                header.className = 'version-header';
                const latestBadge = (typeof i18n !== 'undefined' && i18n.t) ? i18n.t('history.latest') : '最新版本';
                header.innerHTML = `
                    <span class="version-title">${ver.version}</span>
                    <div class="version-meta">
                        <span class="version-date">${ver.date}</span>
                        ${ver.isLatest ? '<span class="version-badge">' + latestBadge + '</span>' : ''}
                    </div>
                `;
                block.appendChild(header);

                // 版本内容
                const content = document.createElement('div');
                content.className = 'version-content';
                
                // 更新日志
                if (ver.changelog) {
                    const changelog = document.createElement('div');
                    changelog.className = 'changelog';
                    const changelogTitle = (typeof i18n !== 'undefined' && i18n.t) ? i18n.t('history.changelog') : '更新内容';
                    changelog.innerHTML = `
                        <h4>${changelogTitle}</h4>
                        <p>${ver.changelog}</p>
                    `;
                    content.appendChild(changelog);
                }

                // 下载列表
                if (ver.files) {
                    const downloadGrid = document.createElement('div');
                    downloadGrid.className = 'download-grid';
                    
                    Object.keys(ver.files).forEach(platform => {
                        ver.files[platform].forEach(file => {
                            const item = document.createElement('div');
                            item.className = 'download-item';
                            const downloadText = (typeof i18n !== 'undefined' && i18n.t) ? i18n.t('history.download') : '下载';
                            item.innerHTML = `
                                <div class="download-item-icon">${platformIcons[platform]}</div>
                                <div class="download-item-info">
                                    <div class="download-item-name">${file.name}</div>
                                    <div class="download-item-arch">${file.arch}</div>
                                </div>
                                <a href="${ver.version}/${file.file}" class="download-item-btn">${downloadText}</a>
                            `;
                            downloadGrid.appendChild(item);
                        });
                    });
                    
                    content.appendChild(downloadGrid);
                }

                block.appendChild(content);
                container.appendChild(block);
            });
        }

        document.addEventListener('DOMContentLoaded', generateVersionList);
    </script>
</body>
